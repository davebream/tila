name: Bug Report
description: Report a bug in tila
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `tila ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or logs if available.
    validations:
      required: true
  - type: input
    id: tila-version
    attributes:
      label: tila Version
      description: Output of `tila --version`.
      placeholder: "0.1.0"
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`.
      placeholder: "v22.0.0"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem.
