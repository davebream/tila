name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm build

      - name: Compile binaries (all 8 targets)
        working-directory: packages/cli
        run: bun run compile

      - name: Source-map leak guard
        run: |
          if find packages/cli/dist/binaries -name '*.map' | grep -q .; then
            echo "ERROR: .map files found in binary output — source-map leak guard failed"
            find packages/cli/dist/binaries -name '*.map'
            exit 1
          fi

      - name: Generate checksums
        working-directory: packages/cli/dist/binaries
        run: |
          sha256sum tila-darwin-arm64 tila-darwin-x64 tila-linux-x64 tila-linux-arm64 \
            tila-linux-x64-musl tila-linux-arm64-musl tila-windows-x64.exe tila-windows-arm64.exe \
            > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: packages/cli/dist/binaries/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries for npm publish
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compiled-binaries
          path: packages/cli/dist/binaries/*
          retention-days: 1

  npm-publish:
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest # OIDC trusted publishing requires npm >= 11.5.1

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI package for publish
        run: pnpm build

      - name: Publish SDK and MCP server (OIDC)
        run: |
          pnpm --filter tila-sdk publish --no-git-checks --access public --provenance
          pnpm --filter tila-mcp-server publish --no-git-checks --access public --provenance

      - name: Download compiled binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compiled-binaries
          path: packages/cli/dist/binaries

      - name: Copy binaries to platform packages
        run: |
          cp packages/cli/dist/binaries/tila-darwin-arm64 packages/cli-darwin-arm64/bin/tila
          cp packages/cli/dist/binaries/tila-darwin-x64 packages/cli-darwin-x64/bin/tila
          cp packages/cli/dist/binaries/tila-linux-x64 packages/cli-linux-x64/bin/tila
          cp packages/cli/dist/binaries/tila-linux-arm64 packages/cli-linux-arm64/bin/tila
          cp packages/cli/dist/binaries/tila-linux-x64-musl packages/cli-linux-x64-musl/bin/tila
          cp packages/cli/dist/binaries/tila-linux-arm64-musl packages/cli-linux-arm64-musl/bin/tila
          cp packages/cli/dist/binaries/tila-windows-x64.exe packages/cli-windows-x64/bin/tila.exe
          cp packages/cli/dist/binaries/tila-windows-arm64.exe packages/cli-windows-arm64/bin/tila.exe
          chmod +x packages/cli-darwin-arm64/bin/tila
          chmod +x packages/cli-darwin-x64/bin/tila
          chmod +x packages/cli-linux-x64/bin/tila
          chmod +x packages/cli-linux-arm64/bin/tila
          chmod +x packages/cli-linux-x64-musl/bin/tila
          chmod +x packages/cli-linux-arm64-musl/bin/tila

      - name: Publish platform packages (OIDC)
        run: |
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-x64 cli-linux-arm64 cli-linux-x64-musl cli-linux-arm64-musl cli-windows-x64 cli-windows-arm64; do
            echo "Publishing tila-$pkg..."
            cd packages/$pkg
            npm publish --access public --provenance
            cd ../..
          done

      - name: Publish main CLI package (OIDC)
        working-directory: packages/cli
        run: npm publish --access public --provenance
